<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Alpha - Shadow DOM</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="shadow.html">Shadow DOM</a></li>
        </ul>
    </nav>
    
    <main>
        <h1>Shadow DOM Test</h1>
        <p>This page tests accessFlow journeys inside a Shadow DOM.</p>

        <div id="shadow-host-open"></div>

        <div id="shadow-host-closed"></div>
    </main>

    <script>
        const shadowStyles = `
            <style>
                .shadow-container {
                    padding: 1rem;
                    border-radius: 8px;
                    margin-top: 1rem;
                }
                .shadow-container h2 { margin-top: 0; }
                button {
                    color: #fff;
                    border: none;
                    padding: 0.6rem 1.2rem;
                    border-radius: 6px;
                    font-size: 1rem;
                    cursor: pointer;
                }
                article {
                    border-radius: 6px;
                    padding: 1rem;
                    margin-top: 1rem;
                }
                article h3 { margin-top: 0; }
                article a { text-decoration: underline; }
                article img { max-width: 100%; height: auto; border-radius: 4px; margin-top: 0.5rem; }
            </style>
        `;

        function setupShadow(hostId, mode, accentColor, borderStyle) {
            const host = document.getElementById(hostId);
            const shadow = host.attachShadow({ mode });

            shadow.innerHTML = shadowStyles + `
                <style>
                    .shadow-container {
                        border: 2px ${borderStyle} ${accentColor};
                    }
                    .shadow-container h2 { color: ${accentColor}; }
                    button { background: ${accentColor}; }
                    button:hover { filter: brightness(0.85); }
                    article {
                        background: ${accentColor}11;
                        border: 1px solid ${accentColor}44;
                    }
                    article h3 { color: ${accentColor}; }
                    article a { color: ${accentColor}; }
                </style>
                <div class="shadow-container">
                    <h2>Shadow DOM — ${mode} mode</h2>
                    <p>Click the button to add an article inside this <strong>${mode}</strong> shadow root.</p>
                    <button id="add-article-btn">Add Article</button>
                    <div id="articles"></div>
                </div>
            `;

            let count = 0;
            shadow.getElementById('add-article-btn').addEventListener('click', () => {
                count++;
                const article = document.createElement('article');
                article.innerHTML = `
                    <h3>Article #${count}</h3>
                    <p>This is dynamically created article number ${count} inside the <strong>${mode}</strong> Shadow DOM.</p>
                    <ul>
                        <li>Item A for article ${count}</li>
                        <li>Item B for article ${count}</li>
                    </ul>
                    <a href="#${mode}-article-${count}">Read more about article ${count}</a>
                    <img src="https://picsum.photos/seed/${mode}${count}/400/150" alt="Placeholder image for article ${count}">
                `;
                shadow.getElementById('articles').appendChild(article);
            });
        }

        setupShadow('shadow-host-open', 'open', '#7c3aed', 'dashed');
        setupShadow('shadow-host-closed', 'closed', '#0891b2', 'solid');
    </script>
    
    <footer>
        <p>&copy; 2026 Test Site</p>
    </footer>
</body>
</html>
